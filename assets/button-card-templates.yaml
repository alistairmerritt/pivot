button_card_templates:

  # ─── Per-device config ───────────────────────────────────────────────────────
  # Add one block per Pivot device. Replace the values with your own.
  # device_suffix       — matches the device_suffix in your firmware YAML
  # media_player        — the media_player entity ID for your VPE
  # timer_silent_toggle — the timer_silent_mode switch entity ID for your VPE
  pivot_config_example:
    variables:
      device_name: Example Pivot
      device_suffix: ha_voice_example
      media_player: media_player.your_vpe_media_player
      timer_silent_toggle: switch.your_vpe_timer_silent_mode

  # ─── Shared component templates ──────────────────────────────────────────────
  pivot_section_heading:
    variables:
      heading: null
      subheading: null
    show_state: false
    show_icon: false
    show_name: true
    show_label: true
    name: '[[[ return variables.heading; ]]]'
    label: '[[[ return variables.subheading; ]]]'
    styles:
      card:
        - background: transparent
        - padding: 0px
        - border-radius: 0px
      name:
        - justify-self: start
        - font-size: 22px
        - font-weight: 400
        - color: var(--primary-text-color)
      label:
        - justify-self: start
        - font-size: 14px
        - font-weight: 400
        - color: rgba(255,255,255,0.5)
        - margin-top: '-8px'

  pivot_active_bank:
    variables:
      active_bank_entity: '[[[ return `number.${variables.device_suffix}_active_bank`; ]]]'
    show_name: false
    show_state: false
    show_icon: false
    styles:
      card:
        - background: transparent
        - border: none
        - box-shadow: none
        - padding: 0px
      grid:
        - grid-template-areas: '"bank"'
        - grid-template-columns: 1fr
        - width: 100%
      custom_fields:
        bank:
          - width: 100%
    custom_fields:
      bank:
        card:
          type: custom:button-card
          show_name: true
          show_icon: false
          name: |
            [[[
              const controlMode = states[`switch.${variables.device_suffix}_control_mode`]?.state;
              if (controlMode !== 'on') return 'Control mode off';
              const activeBank = Math.round(parseFloat(states[variables.active_bank_entity]?.state));
              const bankNum = activeBank + 0;
              const nameEntityId = states[`text.${variables.device_suffix}_bank_${activeBank - 1}_entity`]?.state;
              const entityName = nameEntityId && states[nameEntityId]
                ? (states[nameEntityId].attributes.friendly_name || nameEntityId)
                : (nameEntityId || 'Unknown');
              const titleCase = entityName.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
              return `Bank ${bankNum} - ${titleCase}`;
            ]]]
          tap_action:
            action: more-info
            entity: '[[[ return variables.active_bank_entity; ]]]'
          styles:
            grid:
              - grid-template-areas: '"dot n"'
              - grid-template-columns: 20px 1fr
              - align-items: center
              - gap: 10px
            card:
              - background: transparent
              - border: none
              - box-shadow: none
              - padding: 0px
              - height: 30px
              - border-radius: 0px
            name:
              - color: '#ffffff'
              - font-size: 14px
              - font-weight: 400
              - justify-self: start
            custom_fields:
              dot:
                - width: 20px
                - height: 20px
          custom_fields:
            dot:
              card:
                type: custom:button-card
                entity: |
                  [[[
                    const activeBank = Math.round(parseFloat(states[variables.active_bank_entity]?.state));
                    return `light.${variables.device_suffix}_bank_${activeBank - 1}_color_light`;
                  ]]]
                show_name: false
                show_state: false
                show_icon: true
                icon: mdi:circle
                styles:
                  card:
                    - background: transparent
                    - border: none
                    - box-shadow: none
                    - padding: 0
                    - width: 20px
                    - height: 20px
                    - min-height: unset
                  icon:
                    - color: |
                        [[[
                          const controlMode = states[`switch.${variables.device_suffix}_control_mode`]?.state;
                          if (controlMode !== 'on') return '#545454';
                          const activeBank = Math.round(parseFloat(states[variables.active_bank_entity]?.state));
                          return states[`text.${variables.device_suffix}_bank_${activeBank - 1}_color`]?.state ?? '#ff5252';
                        ]]]
                    - width: 15px
                    - height: 15px

  pivot_toggle_row:
    variables:
      toggle_entity: null
      depends_on_entity: null
    entity: >-
      [[[ return `switch.${variables.device_suffix}_${variables.toggle_entity}`;
      ]]]
    name: |
      [[[
        const labels = {
          'control_mode': 'Control Mode',
          'announcements': 'Announcements',
          'show_control_value': 'Display Persistent Value',
          'dim_when_idle': 'Dim Gauge LEDs While Idle',
        };
        return labels[variables.toggle_entity] ?? variables.toggle_entity;
      ]]]
    label: |
      [[[
        const labels = {
          'control_mode': 'Enable or disable Pivot control',
          'announcements': 'Announce bank changes using voice',
          'show_control_value': 'Keep current value visible on the LED ring when idle',
          'dim_when_idle': 'Reduce LED brightness when not interacting with dial',
        };
        return labels[variables.toggle_entity] ?? '';
      ]]]
    show_state: false
    show_icon: false
    show_name: true
    show_label: true
    tap_action:
      action: toggle
    double_tap_action:
      action: more-info
    hold_action:
      action: more-info
    styles:
      grid:
        - grid-template-areas: '"n btn" "l btn"'
        - grid-template-columns: 1fr min-content
        - grid-template-rows: min-content
        - align-items: center
      card:
        - background: transparent
        - padding: 0px
        - border-radius: 0px
        - height: 50px
        - opacity: |
            [[[
              const deps = {
                'dim_when_idle': `switch.${variables.device_suffix}_show_control_value`,
              };
              const dep = deps[variables.toggle_entity];
              if (!dep) return '1';
              return states[dep]?.state === 'on' ? '1' : '0.3';
            ]]]
        - pointer-events: |
            [[[
              const deps = {
                'dim_when_idle': `switch.${variables.device_suffix}_show_control_value`,
              };
              const dep = deps[variables.toggle_entity];
              if (!dep) return 'auto';
              return states[dep]?.state === 'on' ? 'auto' : 'none';
            ]]]
      custom_fields:
        btn:
          - justify-content: end
          - align-self: center
      name:
        - justify-self: start
        - align-self: center
        - font-size: 14px
        - font-weight: 400
        - color: var(--primary-text-color)
      label:
        - justify-self: start
        - align-self: center
        - font-size: 14px
        - font-weight: 400
        - color: rgba(255,255,255,0.5)
        - margin-top: '-8px'
    custom_fields:
      btn:
        card:
          type: custom:layout-card
          layout_type: custom:grid-layout
          layout:
            grid-template-columns: min-content
            grid-template-rows: min-content
            grid-template-areas: '"one"'
          cards:
            - type: custom:button-card
              entity: >-
                [[[ return
                `switch.${variables.device_suffix}_${variables.toggle_entity}`;
                ]]]
              show_name: false
              styles:
                grid:
                  - grid-template-areas: '"chips"'
                card:
                  - background: '#171717'
                  - align-self: end
                  - justify-self: end
                  - height: 27px
                  - width: 45px
                  - padding: 2px
                  - border-radius: 25px
                  - margin-right: '-8px'
              custom_fields:
                chips:
                  card:
                    type: horizontal-stack
                    cards:
                      - type: custom:button-card
                        entity: >-
                          [[[ return
                          `switch.${variables.device_suffix}_${variables.toggle_entity}`;
                          ]]]
                        show_state: false
                        show_icon: false
                        show_name: false
                        tap_action:
                          action: toggle
                        state:
                          - value: 'on'
                            styles:
                              card:
                                - background: transparent
                        styles:
                          card:
                            - background: '#545454'
                            - height: 20px
                            - border-radius: 25px
                            - width: 20px
                            - margin: 0px -10px 0px 0px
                            - filter: drop-shadow(rgba(0,0,0,0.3) 0.0rem 0.0rem 2px)
                      - type: custom:button-card
                        entity: >-
                          [[[ return
                          `switch.${variables.device_suffix}_${variables.toggle_entity}`;
                          ]]]
                        show_state: false
                        show_icon: false
                        show_name: false
                        tap_action:
                          action: toggle
                        state:
                          - value: 'off'
                            styles:
                              card:
                                - background: transparent
                        styles:
                          card:
                            - background: rgba(255,255,255,1)
                            - height: 20px
                            - border-radius: 25px
                            - width: 20px
                            - filter: drop-shadow(rgba(0,0,0,0.3) 0.0rem 0.0rem 2px)

  pivot_banks:
    variables:
      bank_number: null
      active_bank_entity: '[[[ return `number.${variables.device_suffix}_active_bank`; ]]]'
      color_entity: >-
        [[[ return `text.${variables.device_suffix}_bank_${variables.bank_number
        - 1}_color`; ]]]
      name_entity: >-
        [[[ return `text.${variables.device_suffix}_bank_${variables.bank_number
        - 1}_entity`; ]]]
      value_entity: >-
        [[[ return
        `number.${variables.device_suffix}_bank_${variables.bank_number -
        1}_value`; ]]]
      passive_entity: >-
        [[[ return
        `binary_sensor.${variables.device_suffix}_bank_${variables.bank_number -
        1}_passive`; ]]]
      mirror_entity: >-
        [[[ return
        `switch.${variables.device_suffix}_bank_${variables.bank_number -
        1}_mirror_light`; ]]]
      color_light_entity: >-
        [[[ return
        `light.${variables.device_suffix}_bank_${variables.bank_number -
        1}_color_light`; ]]]
      timer_state_entity: '[[[ return `select.${variables.device_suffix}_timer_state`; ]]]'
      timer_end_entity: '[[[ return `text.${variables.device_suffix}_timer_end`; ]]]'
      timer_silent_toggle: null
    show_name: false
    show_state: false
    show_icon: false
    tap_action:
      action: perform-action
      perform_action: number.set_value
      target:
        entity_id: '[[[ return `number.${variables.device_suffix}_active_bank`; ]]]'
      data:
        value: '[[[ return variables.bank_number; ]]]'
    styles:
      card:
        - border-radius: 20px
        - box-shadow: none
        - padding: 15px
        - text-align: left
        - border: |
            [[[
              const activeBank = Math.round(parseFloat(states[variables.active_bank_entity]?.state));
              const isActive = activeBank === variables.bank_number;
              return isActive ? '1px solid rgba(180,180,180,0.4)' : '1px solid transparent';
            ]]]
      grid:
        - grid-template-areas: '"bank" "name" "slider" "timer-control" "timer-silent" "mirror"'
        - grid-template-columns: 1fr
        - grid-template-rows: auto auto auto auto auto
        - width: 100%
      custom_fields:
        bank:
          - width: 100%
        name:
          - width: 100%
        slider:
          - width: 100%
        mirror:
          - width: 100%
        timer-control:
          - width: 100%
        timer-silent:
          - width: 100%
    custom_fields:
      bank:
        card:
          type: custom:button-card
          show_name: true
          show_icon: false
          name: '[[[ return ''Bank '' + variables.bank_number; ]]]'
          tap_action:
            action: perform-action
            perform_action: number.set_value
            target:
              entity_id: '[[[ return `number.${variables.device_suffix}_active_bank`; ]]]'
            data:
              value: '[[[ return variables.bank_number; ]]]'
          styles:
            grid:
              - grid-template-areas: '"dot n pencil"'
              - grid-template-columns: 20px auto 1fr
              - align-items: center
              - gap: 10px
            card:
              - background: transparent
              - border: none
              - border-radius: 10px
              - box-shadow: none
              - padding: 0px
              - height: 30px
              - margin-top: '-5px'
            name:
              - color: var(--primary-text-color)
              - font-size: 14px
              - font-weight: 400
              - justify-self: start
            custom_fields:
              dot:
                - width: 20px
                - height: 20px
              pencil:
                - justify-self: end
          custom_fields:
            dot:
              card:
                type: custom:button-card
                entity: '[[[ return variables.color_light_entity; ]]]'
                tap_action:
                  action: more-info
                  entity: '[[[ return variables.color_light_entity; ]]]'
                show_name: false
                show_state: false
                show_icon: true
                icon: mdi:circle
                styles:
                  card:
                    - background: transparent
                    - border: none
                    - box-shadow: none
                    - padding: 0
                    - width: 20px
                    - height: 20px
                    - min-height: unset
                  icon:
                    - color: >-
                        [[[return states[variables.color_entity]?.state ??
                        '#ff5252';]]]
                    - width: 15px
                    - height: 15px
            pencil:
              card:
                type: custom:button-card
                show_name: true
                show_icon: true
                icon: mdi:pencil
                name: EDIT ENTITY
                tap_action:
                  action: more-info
                  entity: '[[[ return variables.name_entity; ]]]'
                styles:
                  grid:
                    - grid-template-areas: '"n i"'
                    - grid-template-columns: auto auto
                    - align-items: end
                  card:
                    - background: transparent
                    - border: none
                    - box-shadow: none
                    - height: 25px
                    - width: 90px
                    - border-radius: 0px
                  name:
                    - color: '#545454'
                    - font-size: 10px
                    - font-weight: 400
                    - letter-spacing: 0.05em
                  icon:
                    - width: 15px
                    - color: '#545454'
      name:
        card:
          type: custom:button-card
          entity: '[[[ return variables.name_entity; ]]]'
          tap_action:
            action: >-
              [[[ const e = states[variables.name_entity]?.state; return
              e?.toLowerCase() === 'timer' ? 'none' : 'more-info'; ]]]
            entity: '[[[ return states[variables.name_entity]?.state; ]]]'
          show_name: true
          show_icon: false
          name: |
            [[[
              const entityId = states[variables.name_entity]?.state;
              const name = entityId && states[entityId]
                ? (states[entityId].attributes.friendly_name || entityId)
                : (entityId || 'Unknown');

              return name?.toLowerCase() === 'timer'
                ? 'Timer'
                : name;
            ]]]
          custom_fields:
            pct:
              card:
                type: custom:button-card
                show_name: true
                show_state: false
                show_icon: false
                name: |
                  [[[
                    const passive = states[variables.passive_entity]?.state;
                    const value = parseFloat(states[variables.value_entity]?.state ?? 0);
                    if (passive === 'on') {
                      const nameEntityId = states[variables.name_entity]?.state;
                      const namedEntity = nameEntityId ? states[nameEntityId]?.state : undefined;
                      if (namedEntity === 'on') return 'On';
                      return value === 0 ? 'Off' : 'On';
                    }
                    const nameEntityId = states[variables.name_entity]?.state;
                    if (nameEntityId?.toLowerCase() === 'timer') {
                      const timerState = states[variables.timer_state_entity]?.state;
                      if (timerState === 'alerting') return 'Timer Finished';
                      if (timerState === 'running') {
                        const endVal = states[variables.timer_end_entity]?.state;
                        if (endVal?.match(/^\d{4}-\d{2}-\d{2}T/)) {
                          const mins = Math.max(0, Math.round((new Date(endVal) - new Date()) / 60000));
                          return `${mins} ${mins === 1 ? 'min' : 'mins'} remaining`;
                        }
                      }
                      if (timerState === 'paused') {
                        const endVal = states[variables.timer_end_entity]?.state;
                        if (endVal?.match(/^P\d+$/)) {
                          const mins = Math.round(parseInt(endVal.substring(1)) / 60);
                          return `Paused – ${mins} ${mins === 1 ? 'min' : 'mins'} remaining`;
                        }
                      }
                      const presets = { 24: 15, 50: 30, 75: 45, 100: 60 };
                      const mins = presets[Math.round(value)] ?? Math.round((value / 100) * 60);
                      return `${mins} ${mins === 1 ? 'min' : 'mins'}`;
                    }
                    return `${Math.round(value)}%`;
                  ]]]
                styles:
                  card:
                    - background: transparent
                      border-radius: 0px
                      height: 30px
                      border: none
                  name:
                    - font-size: 25px
                      color: '#545454'
                      font-weight: 400
          styles:
            grid:
              - grid-template-areas: '"n pct"'
                grid-template-columns: 1fr
                grid-template-rows: min-content min-content
                align-content: center
            card:
              - padding: 0px 0px 0px 0px
                margin: 5px -20px 0px 0px
                background: transparent
                border-radius: 10px
                height: 40px
                border: none
            name:
              - font-weight: 400
                justify-self: start
                padding-bottom: 0px
                font-size: 25px
      slider:
        card:
          type: custom:my-slider-v2
          entity: '[[[ return variables.value_entity; ]]]'
          mode: seekbar
          min: 0
          max: 100
          styles:
            card:
              - height: 23px
              - background: none
              - margin: 10px 0px 0px 0px
              - display: |
                  [[[
                    return states[variables.passive_entity]?.state === 'on'
                      ? 'none'
                      : 'block';
                  ]]]
            container:
              - border-radius: 150px
              - background: none
              - padding: 0 0 0 0px
              - height: 23px
              - border: none
            track:
              - background: >
                  [[[return (states[variables.color_entity]?.state ?? '#ff5252')
                  + '33';]]]
              - border-radius: 99px
              - padding: 0 0px 0 0px
              - height: 23px
              - margin: 0px 0 0 0
              - border: none
            progress:
              - background: >
                  [[[return states[variables.color_entity]?.state ??
                  '#ff5252';]]]
              - border-radius: 25px 0px 0px 25px
              - height: 23px
              - margin: 0 0 0 0
              - border: none
            thumb:
              - background: >
                  [[[return states[variables.color_entity]?.state ??
                  '#ff5252';]]]
              - display: |
                  [[[
                    return parseFloat(states[variables.value_entity]?.state) === 0
                      ? 'none'
                      : 'block';
                  ]]]
              - width: 15px
              - height: 23px
              - margin-right: '-10px'
              - border-radius: 0px 150px 150px 0px
              - border: none
      mirror:
        card:
          type: custom:button-card
          entity: '[[[ return variables.mirror_entity; ]]]'
          name: Mirror Light Colour
          show_state: false
          show_icon: true
          show_name: true
          icon: mdi:palette
          tap_action:
            action: toggle
          double_tap_action:
            action: more-info
          hold_action:
            action: more-info
          styles:
            grid:
              - grid-template-areas: '"i n btn"'
              - grid-template-columns: 20px 1fr min-content
              - grid-template-rows: min-content
              - align-items: center
            icon:
              - width: 20px
                color: '#545454'
                margin: 0px 0px 7px 0px
                padding: 0px 0px 0px 0px
            card:
              - background: transparent
              - padding: 0px 0px 10px 0px
              - border-radius: 10px
              - border: none
              - height: 50px
              - margin: 10px 0px -15px 0px
              - display: |
                  [[[
                    const entityId = states[variables.name_entity]?.state;
                    return entityId?.startsWith('light.') ? 'block' : 'none';
                  ]]]
            custom_fields:
              btn:
                - justify-content: end
                - align-self: center
            name:
              - justify-self: start
              - align-self: center
              - font-size: 14px
              - font-weight: 400
              - color: var(--primary-text-color)
              - margin-top: '-8px'
                padding: 0px 0px 0px 10px
          custom_fields:
            btn:
              card:
                type: custom:layout-card
                layout_type: custom:grid-layout
                layout:
                  grid-template-columns: min-content
                  grid-template-rows: min-content
                  grid-template-areas: '"one"'
                cards:
                  - type: custom:button-card
                    entity: '[[[ return variables.mirror_entity; ]]]'
                    show_name: false
                    styles:
                      grid:
                        - grid-template-areas: '"chips"'
                      card:
                        - background: '#171717'
                        - align-self: end
                        - justify-self: end
                        - height: 27px
                        - width: 45px
                        - padding: 2px
                        - border-radius: 25px
                        - margin-right: '-8px'
                        - border: none
                    custom_fields:
                      chips:
                        card:
                          type: horizontal-stack
                          cards:
                            - type: custom:button-card
                              entity: '[[[ return variables.mirror_entity; ]]]'
                              show_state: false
                              show_icon: false
                              show_name: false
                              tap_action:
                                action: toggle
                              state:
                                - value: 'on'
                                  styles:
                                    card:
                                      - background: transparent
                              styles:
                                card:
                                  - background: '#545454'
                                  - height: 20px
                                  - border-radius: 25px
                                  - width: 20px
                                  - margin: 0px -10px 0px 0px
                                  - filter: drop-shadow(rgba(0,0,0,0.3) 0.0rem 0.0rem 2px)
                                  - border: none
                            - type: custom:button-card
                              entity: '[[[ return variables.mirror_entity; ]]]'
                              show_state: false
                              show_icon: false
                              show_name: false
                              tap_action:
                                action: toggle
                              state:
                                - value: 'off'
                                  styles:
                                    card:
                                      - background: transparent
                              styles:
                                card:
                                  - background: rgba(255,255,255,1)
                                  - height: 20px
                                  - border-radius: 25px
                                  - width: 20px
                                  - filter: drop-shadow(rgba(0,0,0,0.3) 0.0rem 0.0rem 2px)
                                  - border: none
      timer-control:
        card:
          type: vertical-stack
          cards:
            - type: conditional
              conditions:
                - condition: state
                  entity: '[[[ return variables.timer_state_entity; ]]]'
                  state: alerting
              card:
                type: custom:button-card
                styles:
                  card:
                    - background-color: '#171717'
                    - border-radius: 10px
                    - border: none
                    - box-shadow: none
                    - padding: 5px
                    - display: |
                        [[[
                          const nameEntityId = states[variables.name_entity]?.state;
                          return nameEntityId?.toLowerCase() === 'timer' ? 'block' : 'none';
                        ]]]
                    - margin: 20px 0px 0px 0px
                  grid:
                    - grid-template-areas: '"stop repeat"'
                    - grid-template-columns: 1fr 1fr
                    - width: 100%
                    - column-gap: 5px
                custom_fields:
                  repeat:
                    card:
                      type: custom:button-card
                      name: Repeat
                      show_icon: true
                      show_name: true
                      icon: mdi:refresh
                      tap_action:
                        action: perform-action
                        perform_action: script.turn_on
                        target:
                          entity_id: script.pivot_timer_toggle
                        data:
                          variables:
                            device_suffix: '[[[ return variables.device_suffix; ]]]'
                            bank: '[[[ return variables.bank_number; ]]]'
                      styles:
                        grid:
                          - grid-template-areas: '''i n'''
                          - grid-template-columns: auto auto
                          - justify-content: center
                          - gap: 8px
                        icon:
                          - width: 20px
                        img_cell:
                          - width: 20px
                          - height: 20px
                        card:
                          - height: 40px
                          - border-radius: 10px
                          - background-color: '#2a2a2a'
                          - box-shadow: none
                          - border: none
                        name:
                          - font-size: 14px
                          - font-weight: 400
                  stop:
                    card:
                      type: custom:button-card
                      name: Stop
                      show_icon: true
                      show_name: true
                      icon: mdi:close
                      tap_action:
                        action: perform-action
                        perform_action: script.turn_on
                        target:
