blueprint:
  name: Pivot - Scene Scrubbing
  description: >
    Cycle through up to four entities with the Pivot dial. Each knob turn
    advances one slot (jumping to the next 25% boundary), updating the LED ring
    to show which slot is active. Press to activate the current slot's entity.
    Works with scenes, lights, switches, or anything Home Assistant can turn on.
    Slots 2–4 are optional — only filled slots are cycled through.
    Assign an input_number helper (range 0–100) to the bank.
  domain: automation
  input:
    suffix:
      name: Device suffix
      description: The suffix of your Pivot device (e.g. ha_voice_lounge)
      selector:
        text: {}
    bank:
      name: Bank number
      description: The bank number to listen on (1–4)
      selector:
        number:
          min: 1
          max: 4
          mode: box
    input_number_entity:
      name: Input number helper
      description: The input_number entity assigned to this bank (range 0–100)
      selector:
        entity:
          domain: input_number
    scene_1:
      name: Entity 1 (0–25%)
      selector:
        entity: {}
    scene_2:
      name: Entity 2 (25–50%)
      description: Optional
      default:
      selector:
        entity: {}
    scene_3:
      name: Entity 3 (50–75%)
      description: Optional
      default:
      selector:
        entity: {}
    scene_4:
      name: Entity 4 (75–100%)
      description: Optional
      default:
      selector:
        entity: {}
    color_1:
      name: Colour — Entity 1
      default: [40, 137, 255]
      selector:
        color_rgb: {}
    color_2:
      name: Colour — Entity 2
      default: [255, 125, 25]
      selector:
        color_rgb: {}
    color_3:
      name: Colour — Entity 3
      default: [151, 255, 61]
      selector:
        color_rgb: {}
    color_4:
      name: Colour — Entity 4
      default: [200, 0, 255]
      selector:
        color_rgb: {}

variables:
  suffix_var: !input suffix
  bank_var: !input bank

triggers:
  - trigger: homeassistant
    event: start
    id: start
  - trigger: event
    event_type: pivot_knob_turn
    event_data:
      suffix: !input suffix
      bank: !input bank
    id: dial
  - trigger: event
    event_type: pivot_button_press
    event_data:
      suffix: !input suffix
      bank: !input bank
      press_type: single_press
    id: press

actions:
  - variables:
      input_number_entity: !input input_number_entity
      suffix_var: !input suffix
      bank_var: !input bank
      scene_1: !input scene_1
      scene_2: !input scene_2
      scene_3: !input scene_3
      scene_4: !input scene_4
      color_1: !input color_1
      color_2: !input color_2
      color_3: !input color_3
      color_4: !input color_4
      entities: "{{ [scene_1, scene_2, scene_3, scene_4] }}"
      colors: "{{ [color_1, color_2, color_3, color_4] }}"
      filled_count: >-
        {% set ns = namespace(count=0) %}
        {% for e in [scene_1, scene_2, scene_3, scene_4] %}
          {% if e is not none and e != '' %}{% set ns.count = ns.count + 1 %}{% endif %}
        {% endfor %}
        {{ ns.count }}
      # For dial trigger: use the raw event value to determine which physical zone
      # the dial is in. This avoids the race between the integration writing the
      # physical position and our snapping logic.
      raw_val: >-
        {% if trigger.id == 'dial' %}
          {{ trigger.event.data.value | float(0) }}
        {% else %}
          {{ states(input_number_entity) | float(0) }}
        {% endif %}
      current_slot: "{{ [(raw_val / 25) | int, 3] | min }}"
      selected_entity: >-
        {% set e = [scene_1, scene_2, scene_3, scene_4][current_slot | int] %}
        {{ e if e is not none and e != '' else scene_1 }}
      ring_color: >-
        {% set c = [color_1, color_2, color_3, color_4][current_slot | int] %}
        {{ '#%02x%02x%02x' | format(c[0] | int, c[1] | int, c[2] | int) }}
  - condition: template
    value_template: "{{ states('text.' ~ suffix_var ~ '_bank_' ~ bank_var ~ '_entity') == input_number_entity }}"
  - choose:
      - conditions:
          - condition: trigger
            id: dial
          - condition: template
            value_template: "{{ filled_count | int > 1 }}"
        sequence:
          - variables:
              next_slot: >-
                {% set cur = current_slot | int %}
                {% set ns = namespace(result=cur, found=false) %}
                {% for i in range(1, 5) %}
                  {% if not ns.found %}
                    {% set idx = (cur + i) % 4 %}
                    {% set e = [scene_1, scene_2, scene_3, scene_4][idx] %}
                    {% if e is not none and e != '' %}
                      {% set ns.result = idx %}
                      {% set ns.found = true %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {{ ns.result }}
              next_val: "{{ [0, 25, 50, 75][next_slot | int] }}"
              next_ring_color: >-
                {% set c = [color_1, color_2, color_3, color_4][next_slot | int] %}
                {{ '#%02x%02x%02x' | format(c[0] | int, c[1] | int, c[2] | int) }}
          - action: input_number.set_value
            target:
              entity_id: "{{ input_number_entity }}"
            data:
              value: "{{ next_val }}"
          - action: text.set_value
            target:
              entity_id: "text.{{ suffix_var }}_bank_{{ bank_var }}_color"
            data:
              value: "{{ next_ring_color }}"
          - action: text.set_value
            target:
              entity_id: "text.{{ suffix_var }}_bank_{{ bank_var }}_configured_color"
            data:
              value: "{{ next_ring_color }}"
      - conditions:
          - condition: trigger
            id: press
        sequence:
          - action: homeassistant.toggle
            target:
              entity_id: "{{ selected_entity }}"
      - conditions:
          - condition: trigger
            id: start
        sequence:
          - action: text.set_value
            target:
              entity_id: "text.{{ suffix_var }}_bank_{{ bank_var }}_color"
            data:
              value: "{{ ring_color }}"
          - action: text.set_value
            target:
              entity_id: "text.{{ suffix_var }}_bank_{{ bank_var }}_configured_color"
            data:
              value: "{{ ring_color }}"

mode: single
