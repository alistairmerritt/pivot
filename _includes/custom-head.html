<link rel="icon" type="image/svg+xml" href="{{ "/assets/images/icon.svg" | relative_url }}">
<style>
  /* Header layout: logo stacked above nav */
  .site-header {
    border-top: none;
    border-bottom: 1px solid #e0e0e0;
    padding: 16px 0 10px;
    background: #fff;
  }

  .site-header .wrapper {
    display: flex !important;
    flex-direction: column !important;
    align-items: flex-start !important;
    gap: 10px !important;
  }

  .site-title {
    float: none !important;
    display: flex !important;
    align-items: center;
    font-size: 0 !important;
    letter-spacing: 0;
  }

  .site-title img.site-logo {
    height: 40px !important;
    width: auto;
    display: block;
  }

  .site-title:hover { text-decoration: none; }

  /* Nav: single row, left-aligned, small font */
  .site-nav {
    float: none !important;
    line-height: normal !important;
    width: 100%;
  }

  .site-nav .trigger {
    display: flex !important;
    flex-direction: row !important;
    flex-wrap: nowrap !important;
    justify-content: flex-start !important;
    gap: 1.4rem;
    padding-bottom: 0;
  }

  .site-nav .page-link {
    margin-left: 0 !important;
    margin-right: 0 !important;
    color: #111 !important;
    font-size: 11px !important;
    font-weight: 500;
    white-space: nowrap;
    line-height: normal !important;
  }

  .site-nav .page-link:hover { color: #555 !important; text-decoration: none; }

  /* Headings */
  h1 { font-size: 1.4rem !important; font-weight: 700; }
  h2 { font-size: 0.9rem !important; font-weight: 700; border-bottom: 1px solid #e0e0e0; padding-bottom: 6px; margin-top: 40px; }
  h3 { font-size: 0.82rem !important; font-weight: 700; }
  .post-title, .page-heading { font-size: 1.4rem !important; font-weight: 700; }

  /* Code */
  code { background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 3px; padding: 1px 5px; font-size: 13px; color: #111; }
  pre { background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 4px; padding: 16px; }
  pre code { background: none; border: none; padding: 0; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; }
  th { background: #f5f5f5; font-weight: 600; text-align: left; padding: 10px 12px; border: 1px solid #e0e0e0; }
  td { padding: 9px 12px; border: 1px solid #e0e0e0; }
  tr:nth-child(even) td { background: #fafafa; }

  /* Blockquotes */
  blockquote { border-left: 3px solid #111; margin: 20px 0; padding: 12px 20px; background: #f9f9f9; color: #333; font-style: normal; }
  blockquote p { margin: 0; }

  /* Links */
  a { color: #111; }

  /* Footer */
  .site-footer { border-top: 1px solid #e0e0e0; color: #999; font-size: 13px; }
</style>
